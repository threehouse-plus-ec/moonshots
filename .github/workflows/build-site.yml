name: Build & Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'apollo/**'
      - 'artemis/**'
      - 'luna/**'
      - 'change/**'
      - 'chandrayaan/**'
      - 'essays/**'
      - 'docs/_template.html'
      - 'docs/tokens.css'
      - 'docs/build.sh'
      - 'docs/index.html'
      - 'docs/*.svg'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build site
        run: bash docs/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
